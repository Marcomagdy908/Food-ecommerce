<div class="auth-page-wrapper">
  <div class="auth-card animate-slide-up">
    <div class="auth-header">
      <h1 class="auth-title text-primary">Welcome Back</h1>
      <p class="auth-subtitle">Savor the flavor of artisanal pizza, delivered fresh to your door.</p>
    </div>

    @if (errorMessage()) {
      <div class="auth-error-alert animate-fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
          <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q167 0 283.5-116.5T800-480q0-167-116.5-283.5T480-800q-167 0-283.5 116.5T80-480q0 167 116.5 283.5T480-160Zm0-320Z"/>
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-wrapper">
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            #emailInput="ngModel"
            required
            email
            placeholder="e.g. alessandro@artisan.com"
            class="form-input"
            [class.input-error]="emailInput.invalid && emailInput.touched"
          />
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password" class="form-label">Password</label>
          <a href="javascript:void(0)" class="forgot-link">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            #passwordInput="ngModel"
            required
            placeholder="••••••••"
            class="form-input"
            [class.input-error]="passwordInput.invalid && passwordInput.touched"
          />
        </div>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading()" class="btn btn-primary btn-block btn-auth">
        @if (isLoading()) {
          <span class="auth-spinner"></span> Signing In...
        } @else {
          Sign In
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/signup" class="auth-link">Sign Up</a></p>
    </div>
  </div>
</div>
