<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <style>
    .stroke-art {
      fill: none;
      stroke: rgba(40, 51, 39, 0.22);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>

  <!-- Group 1: Top Left Whole Pizza -->
  <g class="stroke-art" transform="translate(10, 10)">
    <!-- Outer Crust -->
    <circle cx="80" cy="80" r="70" stroke-dasharray="14 4" />
    <circle cx="80" cy="80" r="62" />
    <!-- Slice Lines -->
    <line x1="80" y1="18" x2="80" y2="142" />
    <line x1="18" y1="80" x2="142" y2="80" />
    <line x1="36" y1="36" x2="124" y2="124" />
    <line x1="124" y1="36" x2="36" y2="124" />
    <!-- Pepperonis -->
    <circle cx="60" cy="50" r="10" />
    <circle cx="105" cy="55" r="9" />
    <circle cx="50" cy="95" r="10" />
    <circle cx="100" cy="105" r="11" />
    <!-- Mushrooms -->
    <path d="M72 70 C72 65, 88 65, 88 70 L84 70 L84 76 L76 76 L76 70 Z" />
    <path d="M110 80 C110 76, 122 76, 122 80 L119 80 L119 85 L113 85 L113 80 Z" />
    <!-- Leaves -->
    <path d="M65 115 C60 110, 70 100, 75 110 C80 120, 70 120, 65 115 Z" />
  </g>

  <!-- Group 2: Top Right Pizza Slice -->
  <g class="stroke-art" transform="translate(240, 20) rotate(15)">
    <!-- Slice Triangle & Crust -->
    <path d="M20 10 L130 50 L50 140 Z" />
    <path d="M125 45 C135 60, 60 145, 45 135" />
    <!-- Crust Texture -->
    <path d="M128 48 C140 70, 70 150, 48 138" stroke-dasharray="6 4" />
    <!-- Toppings -->
    <circle cx="60" cy="55" r="12" />
    <circle cx="85" cy="85" r="14" />
    <circle cx="45" cy="95" r="9" />
    <!-- Basil Leaf -->
    <path d="M75 40 C70 30, 90 30, 85 45 Z" />
    <line x1="78" y1="36" x2="82" y2="42" />
  </g>

  <!-- Group 3: Bottom Left Large Pizza Slice -->
  <g class="stroke-art" transform="translate(30, 220) rotate(-25)">
    <path d="M10 10 L120 40 L40 130 Z" />
    <path d="M115 35 C125 50, 50 135, 35 125" />
    <circle cx="50" cy="50" r="11" />
    <circle cx="75" cy="75" r="13" />
    <path d="M35 80 C35 75, 47 75, 47 80 L44 80 L44 86 L38 86 L38 80 Z" />
    <!-- Olive Rings -->
    <circle cx="85" cy="45" r="7" />
    <circle cx="85" cy="45" r="3" />
  </g>

  <!-- Group 4: Bottom Right Whole Pizza -->
  <g class="stroke-art" transform="translate(230, 210)">
    <circle cx="90" cy="90" r="75" />
    <circle cx="90" cy="90" r="66" stroke-dasharray="10 5" />
    <line x1="90" y1="20" x2="90" y2="160" />
    <line x1="20" y1="90" x2="160" y2="90" />
    <line x1="40" y1="40" x2="140" y2="140" />
    <line x1="140" y1="40" x2="40" y2="140" />
    <circle cx="65" cy="65" r="11" />
    <circle cx="115" cy="65" r="10" />
    <circle cx="65" cy="115" r="12" />
    <circle cx="115" cy="115" r="9" />
    <circle cx="90" cy="50" r="8" />
  </g>

  <!-- Floating Ingredients in Center & Gaps -->
  <!-- Mushroom center -->
  <g class="stroke-art" transform="translate(185, 140) rotate(20)">
    <path d="M10 20 C10 8, 34 8, 34 20 L28 20 L28 32 L16 32 L16 20 Z" />
    <line x1="22" y1="12" x2="22" y2="18" />
  </g>

  <!-- Tomato slice top middle -->
  <g class="stroke-art" transform="translate(180, 40)">
    <circle cx="20" cy="20" r="16" />
    <circle cx="20" cy="20" r="11" />
    <path d="M14 14 C16 12, 24 12, 26 14 C28 20, 12 20, 14 14 Z" />
    <path d="M14 26 C16 28, 24 28, 26 26 C28 20, 12 20, 14 26 Z" />
  </g>

  <!-- Basil leaves center bottom -->
  <g class="stroke-art" transform="translate(165, 310) rotate(-40)">
    <path d="M20 5 C10 15, 10 30, 20 40 C30 30, 30 15, 20 5 Z" />
    <line x1="20" y1="8" x2="20" y2="36" />
    <line x1="20" y1="18" x2="14" y2="14" />
    <line x1="20" y1="24" x2="26" y2="20" />
  </g>

  <!-- Pepperoni Slice -->
  <g class="stroke-art" transform="translate(130, 220)">
    <circle cx="15" cy="15" r="13" />
    <circle cx="15" cy="15" r="10" stroke-dasharray="3 3" />
  </g>

  <!-- Olive Ring -->
  <g class="stroke-art" transform="translate(200, 250)">
    <circle cx="12" cy="12" r="10" />
    <circle cx="12" cy="12" r="5" />
  </g>

  <!-- Small Bell Pepper Ring -->
  <g class="stroke-art" transform="translate(330, 160) rotate(15)">
    <path d="M10 10 Q20 5 30 10 Q35 20 30 30 Q20 35 10 30 Q5 20 10 10 Z" />
    <path d="M14 14 Q20 10 26 14 Q30 20 26 26 Q20 30 14 26 Q10 20 14 14 Z" />
  </g>

  <!-- Repeating Edge Seam Anchors for Seamless Tileability -->
  <g class="stroke-art" transform="translate(-10, 370)">
    <circle cx="20" cy="20" r="15" />
  </g>
  <g class="stroke-art" transform="translate(390, 370)">
    <circle cx="0" cy="20" r="15" />
  </g>
  <g class="stroke-art" transform="translate(-10, -10)">
    <circle cx="20" cy="20" r="15" />
  </g>
  <g class="stroke-art" transform="translate(390, -10)">
    <circle cx="0" cy="20" r="15" />
  </g>
</svg>
